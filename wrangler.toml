name = "image-cf"
main = "src/index.ts"
compatibility_date = "2024-09-09"

# AI 绑定
[ai]
binding = "AI"

# R2 存储绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "image-cf-bucket"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "image-cf-db"
database_id = "7a35e18a-104e-4a4b-9d26-55e6027014fa"

# 静态资源 - 使用 assets 配置
[assets]
directory = "./public"
binding = "ASSETS"

# 生产环境配置
# 注意：敏感变量请使用 Cloudflare Dashboard 设置 Secrets
# wrangler secret put JWT_SECRET
# wrangler secret put ADMIN_USERNAME
# wrangler secret put ADMIN_PASSWORD